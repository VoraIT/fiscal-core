name: PHP CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  fiscal-core:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: dom, mbstring, openssl
        coverage: none

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Run fiscal-core test suite
      run: vendor/bin/phpunit --no-coverage

  invoice-flow-platform:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: ctype, dom, filter, hash, mbstring, openssl, pdo, pdo_sqlite, session, sqlite3, tokenizer
        coverage: none

    - name: Validate Laravel platform composer.json
      working-directory: NotaAgil/invoice-flow/backend/laravel-api
      run: composer validate --strict

    - name: Install Laravel platform dependencies
      working-directory: NotaAgil/invoice-flow/backend/laravel-api
      run: composer install --prefer-dist --no-progress

    - name: Run Laravel platform test suite
      working-directory: NotaAgil/invoice-flow/backend/laravel-api
      run: vendor/bin/phpunit --no-coverage
